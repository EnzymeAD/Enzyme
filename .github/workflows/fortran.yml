name: Fortran

on:
  push:
    branches: 
    - main
    paths:
      - '.github/workflows/fortran.yml'
      - 'enzyme/Enzyme/**'
      - 'enzyme/Fortran/**'
      - 'enzyme/includes/**'
      - 'enzyme/test/**'
      - 'enzyme/tools/**'
      - 'enzyme/benchmarks/**'
      - 'enzyme/cmake/**'
      - 'enzyme/CMakeLists.txt'
      - 'enzyme/CMakePresets.json'
  pull_request:
    paths:
      - '.github/workflows/fortran.yml'
      - 'enzyme/Enzyme/**'
      - 'enzyme/Fortran/**'
      - 'enzyme/includes/**'
      - 'enzyme/test/**'
      - 'enzyme/tools/**'
      - 'enzyme/benchmarks/**'
      - 'enzyme/cmake/**'
      - 'enzyme/CMakeLists.txt'
      - 'enzyme/CMakePresets.json'
  merge_group:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  build-and-test-fortran-flang:
    name: Fortran ${{matrix.build}} ${{matrix.os}} ${{matrix.compiler}} ${{matrix.llvm}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build: [Release, Debug]
        os: [ubuntu-22.04]
        compiler: [flang]
        llvm: [21]
        mpi: [2021.7.1]
    timeout-minutes: 60
    steps:
    - name: add llvm with clang and flang
      run: |
        set -eo pipefail
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|sudo apt-key add -
        sudo apt-add-repository "deb http://apt.llvm.org/`lsb_release -c | cut -f2`/ llvm-toolchain-`lsb_release -c | cut -f2`-${{ matrix.llvm }} main"
        sudo apt-get update && sudo apt-get install -y cmake gcc g++ llvm-${{ matrix.llvm }}-dev ninja-build pip clang-${{ matrix.llvm }} flang-${{ matrix.llvm }}
        sudo python3 -m pip install --upgrade pip lit
    - uses: actions/checkout@v4
    - name: generate build system
      run: |
        rm -rf build && mkdir build && cd build
        cmake ../enzyme -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/llvm -DLLVM_EXTERNAL_LIT=`which lit` -DENZYME_FORTRAN=ON -DCMAKE_Fortran_COMPILER=${{ matrix.compiler }}-${{ matrix.llvm }}
    - name: build enzyme
      working-directory: 'build'
      run: ninja LLVMEnzyme-${{ matrix.llvm }}
    - name: run Fortran tests
      working-directory: 'build'
      run: ninja check-enzyme-fortran
  build-and-test-flang-plugin:
    # Builds the FlangEnzyme frontend plugin (Enzyme/Flang/EnzymeFlang.cpp) and
    # runs its lit test. The plugin requires the Flang development files
    # (FlangConfig.cmake + flangFrontend), and its CMake support is gated on
    # LLVM >= 20, so the matrix runs from that floor up to the current release (22).
    name: Flang plugin ${{matrix.build}} ${{matrix.os}} llvm ${{matrix.llvm}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build: [Release, Debug]
        os: [ubuntu-22.04]
        llvm: [20, 21, 22]
    timeout-minutes: 60
    steps:
    - name: add llvm with clang, flang and mlir
      run: |
        set -eo pipefail
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|sudo apt-key add -
        sudo apt-add-repository "deb http://apt.llvm.org/`lsb_release -c | cut -f2`/ llvm-toolchain-`lsb_release -c | cut -f2`-${{ matrix.llvm }} main"
        # libmlir-N-dev is required: FlangConfig.cmake references MLIR imported
        # targets, so find_package(Flang) needs MLIR to be found first.
        sudo apt-get update && sudo apt-get install -y cmake gcc g++ llvm-${{ matrix.llvm }}-dev ninja-build pip clang-${{ matrix.llvm }} flang-${{ matrix.llvm }} libmlir-${{ matrix.llvm }}-dev
        sudo python3 -m pip install --upgrade pip lit
    - uses: actions/checkout@v4
    - name: generate build system
      run: |
        rm -rf build && mkdir build && cd build
        cmake ../enzyme -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
          -DLLVM_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/llvm \
          -DMLIR_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/mlir \
          -DFlang_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/flang \
          -DLLVM_EXTERNAL_LIT=`which lit` \
          -DENZYME_FORTRAN=ON -DENZYME_FLANG=ON \
          -DCMAKE_Fortran_COMPILER=flang-${{ matrix.llvm }}
    - name: build FlangEnzyme plugin
      working-directory: 'build'
      run: ninja FlangEnzyme-${{ matrix.llvm }}
    - name: check the plugin is a real shared object (not the symlink fallback)
      working-directory: 'build'
      run: test -f Enzyme/FlangEnzyme-${{ matrix.llvm }}.so && ! test -L Enzyme/FlangEnzyme-${{ matrix.llvm }}.so
    - name: run Fortran tests (incl. Flang plugin)
      working-directory: 'build'
      run: ninja check-enzyme-fortran
  build-and-test-fortran-ifx:
    name: Fortran ${{matrix.build}} ${{matrix.os}} ${{matrix.compiler}} ${{matrix.versions.ifx}} llvm ${{matrix.versions.llvm}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build: [Release, Debug]
        os: [ubuntu-22.04]
        compiler: [ifx]
        mpi: [2021.7.1]
        versions:
          - llvm: 15
            ifx: 2023.0.0
          - llvm: 16
            ifx: 2023.1.0
          - llvm: 17
            ifx: 2023.2.4
    timeout-minutes: 60
    steps:
    - name: add llvm without clang and flang
      run: |
        set -eo pipefail
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|sudo apt-key add -
        sudo apt-add-repository "deb http://apt.llvm.org/`lsb_release -c | cut -f2`/ llvm-toolchain-`lsb_release -c | cut -f2`-${{ matrix.versions.llvm }} main"
        sudo apt-get update && sudo apt-get install -y cmake gcc g++ llvm-${{ matrix.versions.llvm }}-dev ninja-build pip
        sudo python3 -m pip install --upgrade pip lit
    - name: add intel tools
      run: |
        set -eo pipefail
        wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        sudo echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
        sudo apt-get update && sudo apt-get install -y intel-oneapi-compiler-fortran-${{ matrix.versions.ifx }} intel-oneapi-mpi-${{ matrix.mpi }} intel-oneapi-mpi-devel-${{ matrix.mpi }}
        source /opt/intel/oneapi/setvars.sh
        printenv >> $GITHUB_ENV
    - uses: actions/checkout@v4
    - name: generate build system
      run: |
        rm -rf build && mkdir build && cd build
        cmake ../enzyme -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_DIR=/usr/lib/llvm-${{ matrix.versions.llvm }}/lib/cmake/llvm -DLLVM_EXTERNAL_LIT=`which lit` -DENZYME_FORTRAN=ON -DCMAKE_Fortran_COMPILER=${{ matrix.compiler }}
    - name: build enzyme
      working-directory: 'build'
      run: ninja LLVMEnzyme-${{ matrix.versions.llvm }}
    - name: run Fortran tests
      working-directory: 'build'
      run: ninja check-enzyme-fortran
